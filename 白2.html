<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>travai - 认真规划，尽兴旅游</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: "Travai Display";
    src: url("assets/fonts/DMSerifDisplay-Regular.ttf") format("truetype");
    font-style: normal;
    font-weight: 400;
    font-display: swap;
  }

  @font-face {
    font-family: "Travai Sans";
    src: url("assets/fonts/Inter-Variable.ttf") format("truetype");
    font-style: normal;
    font-weight: 100 900;
    font-display: swap;
  }

  :root {
    --paper: #ffffff;
    --paper-warm: #fbfaf6;
    --ink: #201f1b;
    --ink-2: #5a574f;
    --ink-3: #9b978c;
    --line: #dededb;
    --line-strong: #bdbab4;
    --icon-gray: #7b7770;
    --greige: #e1e1de;
    --coral: #f58a66;
    --logo-green: rgb(196, 223, 61);
    --green-soft: rgb(196, 223, 61);
    --logo-yellow: #db6730;
    --yellow-soft: #f2c45d;
    --serif: "Prody", "Travai Display", "Noto Serif SC", Georgia, serif;
    --sans: "Travai Sans", "Helvetica Neue", "Noto Sans SC", "PingFang SC", Arial, sans-serif;
    --mono: "Travai Sans", "Helvetica Neue", Arial, sans-serif;
    --type-display: clamp(48px, 5vw, 64px);
    --type-section: 22px;
    --type-body: 15px;
    --type-ui: 13px;
    --leading-display: 1.08;
    --leading-body: 1.62;
    --leading-ui: 1.35;
  }

  * { box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    margin: 0;
    min-height: 100dvh;
    display: flex;
    color: var(--ink);
    background: var(--paper);
    font: var(--type-body)/var(--leading-body) var(--sans);
    font-kerning: normal;
    font-feature-settings: "kern" 1;
    letter-spacing: 0;
    text-rendering: optimizeLegibility;
  }

  button, textarea { font: inherit; }
  button { cursor: pointer; }
  :focus-visible { outline: 2px solid var(--icon-gray); outline-offset: 2px; }

  aside {
    width: 300px;
    flex: none;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 20px 22px 18px;
    border-right: 1px solid var(--line);
    background: #ffffff;
  }

  .brand {
    position: relative;
    z-index: 3;
    padding: 0 2px;
  }
  .brand .logo-frame {
    position: relative;
    width: 250px;
    height: 194px;
    overflow: hidden;
  }
  .brand .lockup {
    position: absolute;
    left: 50%;
    top: 0;
    width: 225px;
    height: auto;
    margin: 0;
    display: block;
    transform: translateX(-50%);
  }
  .brand .tag {
    width: 250px;
    margin-top: -4px;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: 0;
    text-align: center;
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin: 24px 0 0;
    padding: 5px;
    border-radius: 999px;
    background: #e9e9e6;
    border: 1px solid rgb(123 119 112 / .16);
    box-shadow: inset 0 1px 0 rgb(255 255 255 / .75);
  }

  .actions button {
    height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 0 10px;
    border-radius: 999px;
    border: 0;
    background: transparent;
    color: #69655d;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    transition: background .16s, box-shadow .16s, color .16s, transform .16s;
  }

  .actions .en {
    font-family: var(--sans);
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: 0;
  }

  .actions .active {
    color: var(--ink);
    background: #ffffff;
    box-shadow: 0 8px 18px rgb(32 31 27 / .06), inset 0 0 0 1px rgb(123 119 112 / .12);
  }

  .actions button:not(.active):hover {
    color: var(--ink);
    background: rgb(255 255 255 / .46);
  }

  .actions button:active { transform: translateY(0) scale(.98); }

  nav {
    flex: 1;
    overflow-y: auto;
    margin-top: 22px;
    padding-top: 24px;
    border-top: 1px solid rgb(123 119 112 / .28);
    display: flex;
    flex-direction: column;
  }

  .nav-label {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 0 2px;
    margin: 0 0 10px;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14.5px;
    letter-spacing: 0;
    font-weight: 700;
  }

  .nav-label .en {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0;
  }

  .chat-list {
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line);
  }

  .chat-list:empty {
    display: none;
  }

  .chat-list a {
    position: relative;
    display: block;
    padding: 7px 2px 7px 16px;
    color: var(--ink-2);
    text-decoration: none;
    font-family: var(--sans);
    font-size: 14.5px;
    font-weight: 500;
    line-height: 1.45;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chat-list a:hover,
  .chat-list a.current,
  .chat-list a.is-selected { color: var(--logo-green); }

  .chat-list a.current::before {
    content: "";
    position: absolute;
    left: 0;
    top: 10px;
    bottom: 10px;
    width: 2px;
    background: var(--logo-green);
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 11px;
    width: 100%;
    padding: 9px 2px;
    color: var(--ink);
    font: inherit;
    font-size: 14.5px;
    text-align: left;
    background: transparent;
    border: 0;
    cursor: pointer;
  }

  .nav-item:hover,
  .nav-item:focus,
  .nav-item.active { color: var(--logo-green); }
  .nav-item svg { color: var(--ink-2); flex: none; }

  .nav-art-icon {
    width: 28px;
    height: 28px;
    flex: none;
    display: block;
    border-radius: 7px;
    overflow: hidden;
    background: #ffffff;
  }

  .nav-art-icon img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    mix-blend-mode: normal;
  }

  .nav-art-icon.dark-line img {
    filter: grayscale(1) brightness(3) contrast(12);
  }

  .nav-art-icon.light-line img {
    filter: grayscale(1) invert(1) brightness(3) contrast(12);
  }

  .nav-art-icon.original-art img {
    filter: grayscale(1) brightness(3) contrast(12);
    mix-blend-mode: multiply;
  }

  .nav-art-icon.original-art {
    background: #e9e9e6;
  }

  .nav-art-icon.transparent-art {
    background: transparent;
  }

  .nav-art-icon.transparent-art img {
    filter: none;
    mix-blend-mode: normal;
  }

  .nav-copy { min-width: 0; flex: 1; }

  .nav-item .en {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0;
  }

  .insight-badge {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 7px;
    border: 1px solid #ddcce9;
    border-radius: 999px;
    color: #74607f;
    background: #f2e9f7;
    font-family: var(--sans);
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 0;
    white-space: nowrap;
  }

  .insight-badge::before {
    content: "";
    width: 5px;
    height: 5px;
    border-radius: 999px;
    background: #b99bd1;
  }

  .sidebar-illustration {
    width: 190px;
    margin: auto auto 0;
    padding-top: 18px;
    opacity: .38;
    pointer-events: none;
    transform: translateX(10px);
  }

  .sidebar-illustration img {
    display: block;
    width: 100%;
    height: auto;
  }

  .user {
    border-top: 1px solid var(--line);
    padding-top: 16px;
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 11px;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    flex: none;
    border: 1px solid var(--line);
    color: var(--ink-2);
    font-family: var(--mono);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
  }

  .user .mail {
    min-width: 0;
    font-size: 12.5px;
    line-height: 1.5;
  }

  .user .mail div {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .user .mail .sub {
    color: var(--ink-3);
    font-size: 11.5px;
  }

  .logout {
    margin-left: auto;
    padding: 6px;
    display: flex;
    color: var(--ink-3);
    background: none;
    border: none;
  }

  .logout:hover { color: var(--ink); }

  main {
    position: relative;
    min-width: 0;
    flex: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    background: #ffffff;
  }

  main::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: none;
  }

  .topbar {
    position: relative;
    z-index: 3;
    height: 76px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 18px;
    padding: 0 36px;
    color: var(--ink-2);
    font-size: 14px;
  }

  .topbar button {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 6px;
    color: var(--ink-2);
    background: none;
    border: none;
  }

  .topbar button:hover,
  .topbar button:focus-visible { color: var(--logo-green); }

  .hero {
    position: relative;
    z-index: 3;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 32px 56px;
  }

  .corner-tape {
    position: absolute;
    right: 30px;
    bottom: 82px;
    width: min(320px, 30vw);
    height: auto;
    pointer-events: none;
    opacity: .42;
    filter: grayscale(1) brightness(1.18) contrast(.62);
    transform: none;
    transform-origin: center;
  }

  .hero-inner {
    width: min(1200px, 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hero-primary {
    min-width: 0;
  }

  .draw-line {
    width: 100%;
    height: 72px;
    margin: 0 0 8px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: visible;
  }

  .composer-line {
    position: relative;
    width: min(780px, 100%);
    height: 42px;
    margin: -24px auto 40px;
    justify-content: flex-start;
  }

  .composer-line .tape-art {
    max-width: 780px;
    opacity: .18;
    filter: brightness(0) saturate(100%) invert(78%) sepia(42%) saturate(420%) hue-rotate(24deg) brightness(108%) contrast(82%);
  }

  .tape-art {
    width: 100%;
    max-width: 640px;
    height: auto;
    display: block;
    clip-path: inset(0 100% 0 0);
    animation: tapeimage 4.8s cubic-bezier(.45,.05,.28,1) infinite;
  }

  @keyframes tapeimage {
    0% { clip-path: inset(0 100% 0 0); opacity: 0; }
    8% { opacity: 1; }
    64% { clip-path: inset(0 0 0 0); opacity: 1; }
    88% { clip-path: inset(0 0 0 0); opacity: 1; }
    100% { clip-path: inset(0); opacity: 1; }
  }

  h1 {
    margin: 0 auto 14px;
    max-width: 820px;
    color: var(--ink);
    font-family: "Avenir Next", "Trebuchet MS", var(--sans);
    font-size: var(--type-display);
    font-weight: 500;
    letter-spacing: 0;
    line-height: var(--leading-display);
    text-align: center;
  }

  .sub {
    max-width: 620px;
    margin: 0 auto;
    color: var(--ink-2);
    font-size: var(--type-body);
    line-height: var(--leading-body);
    text-align: center;
  }

  .composer-zone {
    width: min(720px, 100%);
    margin-top: 58px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .planning-signals {
    width: min(720px, 100%);
    margin: 14px auto 0;
    display: flex;
    justify-content: center;
    gap: 0;
    flex-wrap: wrap;
    align-items: baseline;
    color: var(--ink-2);
    font-size: var(--type-ui);
    font-weight: 600;
    line-height: var(--leading-ui);
  }

  .planning-signals span {
    padding: 0;
    line-height: var(--leading-ui);
  }

  .planning-signals span + span::before {
    content: "·";
    margin: 0 10px;
    color: #b5b0a6;
  }

  .planning-signals .pink {
    color: var(--logo-green);
    display: inline-block;
  }

  .composer {
    position: relative;
    width: min(720px, 100%);
    padding: 14px 16px 10px;
    background: rgb(255 255 255 / .95);
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    transition: border-color .15s, box-shadow .15s;
  }

  .composer:focus-within {
    border-color: var(--logo-green);
    box-shadow: 0 0 0 3px rgb(196 223 61 / .24);
  }

  .corner-deco {
    position: absolute;
    top: -15px;
    right: 38px;
    width: 68px;
    pointer-events: none;
    opacity: .62;
  }

  textarea {
    width: 100%;
    min-height: 110px;
    resize: none;
    border: none;
    outline: none;
    color: var(--ink);
    background: transparent;
    font: inherit;
    line-height: 1.55;
  }

  textarea:focus-visible { outline: none; }

  textarea::placeholder { color: var(--ink-3); }

  .bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: -2px;
  }

  .icon-btn {
    display: flex;
    padding: 6px;
    color: var(--ink-2);
    background: none;
    border: none;
  }

  .icon-btn:hover { color: var(--ink); }

  .hint {
    color: var(--ink-3);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0;
  }

  .send {
    margin-left: auto;
    width: 44px;
    height: 38px;
    border: 1px solid var(--ink);
    border-radius: 999px;
    background: var(--ink);
    color: var(--logo-green);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .18s, color .18s, transform .18s;
  }

  .send:hover,
  .send:focus-visible { background: var(--logo-green); color: var(--ink); }
  .send:active { transform: scale(.96); }
  .send.is-sent { background: var(--logo-green); color: var(--ink); }

  .chips {
    width: min(720px, 100%);
    display: flex;
    gap: 10px;
    margin: 16px 0 0;
    padding: 0;
    flex-wrap: wrap;
    justify-content: center;
  }

  .chips button {
    min-width: auto;
    min-height: 36px;
    border-radius: 999px;
    padding: 0 14px;
    color: var(--ink-2);
    background: #ffffff;
    font-size: var(--type-ui);
    font-weight: 700;
    line-height: var(--leading-ui);
    white-space: nowrap;
    border: 1px solid var(--line);
    box-shadow: none;
    transition: background .16s, border-color .16s, box-shadow .16s, color .16s, transform .16s;
  }

  .chips button.active {
    color: var(--ink);
    background: rgb(196, 223, 61);
    box-shadow: none;
  }

  .chips button:first-child {
    color: var(--ink);
    background: var(--logo-green);
    border-color: var(--logo-green);
  }

  .chips button:first-child:hover,
  .chips button:first-child:focus-visible {
    background: var(--logo-green);
  }

  .chips button:not(.active):hover {
    color: var(--ink);
    background: var(--logo-green);
    border-color: var(--logo-green);
    transform: translateY(-1px);
  }

  .chips button:active { transform: translateY(0) scale(.98); }
  .chips button.is-selected {
    color: var(--ink);
    background: var(--logo-green);
    border-color: var(--logo-green);
  }

  .travel-train {
    width: min(760px, 100%);
    margin: 28px auto 0;
    opacity: .76;
    pointer-events: none;
  }

  .travel-train img {
    display: block;
    width: 100%;
    height: auto;
  }

  .content-section {
    position: relative;
    z-index: 2;
    width: min(980px, calc(100% - 64px));
    margin: 0 auto;
    padding: 74px 0;
  }

  .section-head {
    max-width: 660px;
    margin-bottom: 30px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    color: #77726a;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .eyebrow::before {
    content: "";
    width: 28px;
    height: 2px;
    border-radius: 999px;
    background: var(--logo-yellow);
  }

  h2 {
    margin: 0;
    color: var(--ink);
    font-family: var(--sans);
    font-size: clamp(32px, 4vw, 52px);
    font-weight: 700;
    letter-spacing: 0;
    line-height: 1.08;
  }

  .section-head p {
    margin: 16px 0 0;
    max-width: 600px;
    color: var(--ink-2);
    font-size: 16px;
  }

  .verify-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.12fr) minmax(280px, .88fr);
    gap: 16px;
  }

  .verify-panel,
  .mini-panel,
  .sample-photo,
  .sample-plan,
  .closing-panel {
    border: 1px solid rgb(32 31 27 / .08);
    background: #fffefa;
    box-shadow: 0 18px 48px rgb(32 31 27 / .06);
  }

  .verify-panel {
    min-height: 374px;
    display: grid;
    grid-template-columns: minmax(0, .92fr) minmax(0, 1.08fr);
    border-radius: 24px;
    overflow: hidden;
  }

  .verify-visual {
    position: relative;
    min-height: 320px;
    padding: 24px;
    background:
      linear-gradient(135deg, rgb(244 180 0 / .16), transparent 62%),
      #f7f3ea;
  }

  .source-note {
    width: fit-content;
    max-width: 100%;
    margin-bottom: 12px;
    border: 1px solid rgb(32 31 27 / .08);
    border-radius: 18px;
    background: rgb(255 255 255 / .78);
    padding: 12px 14px;
    color: var(--ink-2);
    font-size: 13px;
    box-shadow: 0 10px 24px rgb(32 31 27 / .06);
  }

  .source-note strong {
    display: block;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.25;
  }

  .verify-visual img {
    position: absolute;
    right: 18px;
    bottom: 10px;
    width: 136px;
  }

  .verify-copy,
  .mini-panel {
    padding: 28px;
  }

  .verify-copy h3,
  .mini-panel h3 {
    margin: 0;
    font-family: var(--sans);
    font-size: 26px;
    line-height: 1.12;
  }

  .verify-copy p,
  .mini-panel p {
    margin: 14px 0 0;
    color: var(--ink-2);
  }

  .checklist {
    margin: 24px 0 0;
    padding: 0;
    display: grid;
    gap: 12px;
    list-style: none;
    color: var(--ink-2);
  }

  .checklist li {
    display: flex;
    gap: 10px;
  }

  .checklist li::before {
    content: "";
    flex: none;
    width: 18px;
    height: 18px;
    margin-top: 4px;
    border-radius: 999px;
    background:
      radial-gradient(circle at 50% 50%, #7b7268 0 3px, transparent 3px),
      #ece7dd;
  }

  .mini-stack {
    display: grid;
    gap: 16px;
  }

  .mini-panel {
    min-height: 178px;
    border-radius: 24px;
  }

  .mini-panel.risk { background: #f5edf1; }
  .mini-panel.ticket {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 92px;
    align-items: end;
    background: #eef2f6;
  }

  .mini-panel.ticket img {
    width: 92px;
    align-self: end;
    justify-self: end;
  }

  .sample-grid {
    display: grid;
    grid-template-columns: minmax(0, .92fr) minmax(0, 1.08fr);
    gap: 18px;
    align-items: stretch;
  }

  .sample-photo {
    border-radius: 26px;
    padding: 8px;
  }

  .sample-photo img {
    width: 100%;
    min-height: 430px;
    height: 100%;
    object-fit: cover;
    border-radius: 18px;
  }

  .caption {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    margin: 10px 4px 0;
    color: var(--ink-3);
    font-size: 12px;
  }

  .sample-plan {
    position: relative;
    overflow: hidden;
    border-radius: 26px;
    padding: 32px;
    color: var(--paper);
    background: var(--ink);
  }

  .sample-plan::after {
    content: "";
    position: absolute;
    right: -90px;
    top: -100px;
    width: 220px;
    height: 220px;
    border-radius: 999px;
    background: rgb(244 180 0 / .18);
  }

  .sample-plan h2,
  .sample-days {
    position: relative;
  }

  .sample-plan h2 {
    color: var(--paper);
  }

  .sample-days {
    display: grid;
    gap: 12px;
    margin-top: 26px;
  }

  .sample-day {
    display: grid;
    grid-template-columns: 76px 1fr;
    gap: 16px;
    padding: 14px 0;
    border-top: 1px solid rgb(255 255 255 / .14);
  }

  .sample-day span {
    color: #f2c45d;
    font-family: var(--mono);
    font-size: 11px;
  }

  .sample-day strong {
    display: block;
    font-family: var(--sans);
    font-size: 18px;
    line-height: 1.2;
  }

  .sample-day p {
    margin: 5px 0 0;
    color: rgb(255 255 255 / .68);
  }

  .closing-section {
    padding-bottom: 92px;
  }

  .closing-panel {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 22px;
    align-items: center;
    border-radius: 28px;
    padding: 32px;
    background:
      linear-gradient(135deg, rgb(244 180 0 / .14), rgb(232 238 245 / .9)),
      #fffefa;
  }

  .closing-panel p {
    margin: 14px 0 0;
    max-width: 560px;
    color: var(--ink-2);
  }

  .closing-panel .send {
    width: auto;
    min-width: 138px;
    padding: 0 20px;
    text-decoration: none;
  }

  .line-section {
    position: relative;
    z-index: 2;
    width: min(1100px, calc(100% - 72px));
    margin: 0 auto;
    padding: 92px 0 78px;
    background: #fff;
  }

  .line-section + .line-section {
    padding-top: 34px;
  }

  .line-head {
    max-width: 720px;
    margin: 0 auto 72px;
    text-align: center;
  }

  .line-mark {
    width: 46px;
    height: 46px;
    margin: 0 auto 20px;
    color: var(--ink);
  }

  .line-head h2 {
    font-size: clamp(36px, 4.6vw, 62px);
  }

  .line-head p {
    max-width: 620px;
    margin: 18px auto 0;
    color: var(--ink-2);
    font-size: 18px;
    line-height: 1.58;
  }

  .line-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    border-left: 1px solid var(--line);
  }

  .line-item {
    min-height: 260px;
    padding: 22px 48px 8px;
    border-right: 1px solid var(--line);
  }

  .line-item svg {
    display: block;
    width: 30px;
    height: 30px;
    margin-bottom: 58px;
    color: #77736a;
  }

  .line-item h3 {
    margin: 0;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 25px;
    font-weight: 700;
    line-height: 1.14;
  }

  .line-item p {
    margin: 18px 0 0;
    color: var(--ink-2);
    font-size: 16px;
    line-height: 1.72;
  }

  .deer-band {
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 18px 0;
  }

  .deer-band img {
    display: block;
    width: 100%;
    height: 320px;
    object-fit: cover;
    object-position: center;
  }

  .deer-caption {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-top: 12px;
    color: var(--ink-3);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  @media (prefers-reduced-motion: reduce) {
    .tape-art { animation: none; opacity: 1; clip-path: inset(0); }
  }

  @media (max-width: 900px) {
    body { display: block; }
    aside { display: none; }
    main { min-height: 100dvh; }
    .topbar { height: 64px; padding: 0 20px; }
    .hero { padding: 8px 20px 42px; }
    .corner-tape { display: none; }
    .hero-inner { display: block; }
    h1 { font-size: clamp(39px, 11vw, 54px); }
    .sub { font-size: 15px; text-align: left; }
    .planning-signals {
      justify-content: flex-start;
      font-size: 12px;
    }
    .composer-zone { margin-top: 34px; }
    .draw-line { height: 50px; margin-bottom: 8px; }
    .chips { justify-content: flex-start; }
    .chips button { white-space: normal; }
    .travel-train {
      width: 100%;
      margin-top: 22px;
      opacity: .7;
    }
    .content-section {
      width: min(100% - 40px, 720px);
      padding: 54px 0;
    }
    .verify-grid,
    .verify-panel,
    .sample-grid,
    .closing-panel {
      grid-template-columns: 1fr;
    }
    .verify-visual { min-height: 260px; }
    .sample-photo img { min-height: 300px; }
    .closing-panel .send {
      width: fit-content;
      margin-left: 0;
    }
    .line-section {
      width: min(100% - 40px, 720px);
      padding: 58px 0;
    }
    .line-section + .line-section { padding-top: 16px; }
    .line-head {
      margin-bottom: 42px;
      text-align: left;
    }
    .line-mark {
      margin-left: 0;
      margin-right: 0;
    }
    .line-head p { font-size: 16px; }
    .line-grid {
      grid-template-columns: 1fr;
      border-left: 0;
      border-top: 1px solid var(--line);
    }
    .line-item {
      min-height: auto;
      padding: 30px 0;
      border-right: 0;
      border-bottom: 1px solid var(--line);
    }
    .line-item svg { margin-bottom: 24px; }
    .deer-band img { height: 240px; }
    .deer-caption {
      flex-direction: column;
      gap: 4px;
    }
  }
</style>
</head>
<body>
  <aside>
    <div class="brand">
      <div class="logo-frame">
        <img class="lockup" src="logo/travai-logo-standard-display.png" alt="Travai">
      </div>
      <div class="tag">认真规划 · 尽兴旅游</div>
    </div>

    <div class="actions">
      <button class="active">
        新对话 <span class="en">new</span>
      </button>
      <button>
        收藏 <span class="en">Saved</span>
      </button>
    </div>

    <nav>
      <div class="nav-label">
        <span class="nav-art-icon transparent-art"><img src="assets/nav-history-coffee-transparent.png" alt=""></span>
        历史对话 <span class="en">History</span>
      </div>
      <div class="chat-list">
        <a href="#" class="current">Chiang Mai May Day plan</a>
        <a href="#">Cool seaside cities to escape heat</a>
        <a href="#">Okinawa 3-day family trip</a>
        <a href="#">I'd like to plan a trip wit...</a>
      </div>
      <button class="nav-item" type="button">
        <span class="nav-art-icon transparent-art"><img src="assets/nav-trip-sunglasses-transparent.png" alt=""></span>
        <span class="nav-copy">我的行程 <span class="en">My trips</span></span>
      </button>
      <button class="nav-item" type="button">
        <span class="nav-art-icon transparent-art"><img src="assets/nav-library-camera-transparent.png" alt=""></span>
        <span class="nav-copy">旅行收藏夹 <span class="en">Library</span></span>
      </button>
      <div class="sidebar-illustration" aria-hidden="true">
        <img src="assets/airplane-window-coarse-gray.png" alt="">
      </div>
    </nav>

    <div class="user">
      <div class="avatar">1</div>
      <div class="mail">
        <div>18420720@qq.c...</div>
        <div class="sub">18420720@qq.com</div>
      </div>
      <button class="logout" title="Sign out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <button>travai精选行程</button>
      <button>关于我们</button>
    </div>

    <section class="hero" id="planner">
    <img class="corner-tape" src="assets/tape-corner-display.png" alt="">
      <div class="hero-inner">
        <div class="hero-primary">
          <div class="draw-line composer-line" aria-hidden="true">
            <img class="tape-art" src="assets/tape-line-delicate-soft-gray.png" alt="">
          </div>

          <h1>Serious and intelligent<br>planning for every trip</h1>
        <div class="planning-signals" aria-label="planning checks">
          <span>网红避坑</span>
          <span>少走冤枉路</span>
          <span>最省成本</span>
          <span>关门提示</span>
          <span>提前订票</span>
          <span>天气异常提醒</span>
          <span class="pink">越来越懂你的 AI</span>
        </div>

          <div class="composer-zone">
          <div class="composer">
            <textarea placeholder="来吧，试试 AI 有多懂你。告诉我你想去的地方、风格、预算、人数、天数，或者小红书的截图或链接，给你最惊喜、靠谱的精准行程"></textarea>
            <div class="bar">
              <button class="send" type="button" title="Send" aria-label="发送行程需求">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4Z"/></svg>
              </button>
            </div>
          </div>

          <div class="chips">
            <button type="button">+ 我的旅行习惯</button>
            <button type="button">+ 截图</button>
            <button type="button">+ 小红书链接</button>
          </div>
          </div>
        </div>

      </div>
    </section>
  </main>
  <script>
    const composer = document.querySelector('.composer');
    const input = composer.querySelector('textarea');
    const send = composer.querySelector('.send');

    document.querySelectorAll('.chat-list a').forEach((conversation) => {
      conversation.addEventListener('click', (event) => {
        event.preventDefault();
        document.querySelectorAll('.chat-list a').forEach((item) => item.classList.remove('is-selected'));
        conversation.classList.add('is-selected');
      });
    });

    document.querySelectorAll('.chips button').forEach((chip) => {
      chip.addEventListener('click', () => {
        chip.classList.toggle('is-selected');
        const label = chip.textContent.replace(/^\+\s*/, '').trim();
        const prefix = input.value.trim() ? `${input.value.trim()}，` : '';
        if (chip.classList.contains('is-selected') && !input.value.includes(label)) {
          input.value = `${prefix}${label}`;
          input.focus();
        }
      });
    });

    send.addEventListener('click', () => {
      if (!input.value.trim()) {
        input.focus();
        return;
      }
      send.classList.add('is-sent');
      send.setAttribute('aria-label', '已发送');
      window.setTimeout(() => {
        send.classList.remove('is-sent');
        send.setAttribute('aria-label', '发送行程需求');
      }, 900);
    });
  </script>
</body>
</html>
